<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gupshup</title>
<style>
  :root {
    --teal: #0f6e56;
    --teal-light: #e1f5ee;
    --bg: #faf9f6;
    --card: #ffffff;
    --border: #e5e2da;
    --text: #26211c;
    --text-muted: #8a8579;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
  }
  #sidebar {
    width: 220px;
    background: var(--card);
    border-right: 1px solid var(--border);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  #brand { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  #brand .mark {
    width: 28px; height: 28px; border-radius: 8px;
    background: var(--teal-light); color: var(--teal);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
  }
  #brand .name { font-weight: 600; font-size: 16px; }
  #new-chat-btn {
    padding: 9px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--card); cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  #new-chat-btn:hover { background: var(--teal-light); }
  #thread-label { font-size: 11px; color: var(--text-muted); margin: 8px 0 2px; letter-spacing: .03em; }
  #thread-list { display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
  .thread-item {
    font-size: 13px; padding: 8px 10px; border-radius: 8px; cursor: pointer;
    color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .thread-item:hover { background: var(--bg); }
  .thread-item.active { background: var(--teal-light); color: var(--teal); font-weight: 600; }
  #main { flex: 1; display: flex; flex-direction: column; }
  #chat-log { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg-row { display: flex; gap: 8px; max-width: 70%; }
  .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-row.bot { align-self: flex-start; }
  .avatar {
    width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
    background: var(--teal-light); color: var(--teal);
    display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700;
  }
  .bubble { padding: 9px 13px; border-radius: 14px; font-size: 14px; line-height: 1.4; }
  .msg-row.user .bubble { background: var(--teal); color: white; border-bottom-right-radius: 3px; }
  .msg-row.bot .bubble { background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
  #thinking { display: none; align-items: center; gap: 8px; padding: 0 20px 12px; color: var(--text-muted); font-size: 13px; }
  #thinking.visible { display: flex; }
  #file-chip {
    display: none; align-items: center; gap: 6px; width: fit-content;
    background: var(--teal-light); color: var(--teal); font-size: 12px;
    padding: 4px 10px; border-radius: 999px; margin: 0 20px 8px;
  }
  #file-chip.visible { display: flex; }
  #file-chip button { background: none; border: none; color: var(--teal); cursor: pointer; font-size: 13px; }
  #input-bar {
    border-top: 1px solid var(--border); padding: 12px 16px;
    display: flex; align-items: center; gap: 8px;
  }
  #upload-btn, #send-btn {
    border: 1px solid var(--border); background: var(--card); cursor: pointer;
    width: 36px; height: 36px; border-radius: 999px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  #send-btn { background: var(--teal); border: none; color: white; }
  #send-btn:hover { opacity: .9; }
  #upload-btn:hover { background: var(--teal-light); }
  #message-input {
    flex: 1; border: 1px solid var(--border); border-radius: 999px;
    padding: 9px 16px; font-size: 14px; outline: none;
  }
  #message-input:focus { border-color: var(--teal); }
</style>
</head>
<body>

<div id="sidebar">
  <div id="brand"><div class="mark">G</div><div class="name">Gupshup</div></div>
  <button id="new-chat-btn">+ New chat</button>
  <div id="thread-label">THREADS</div>
  <div id="thread-list"></div>
</div>

<div id="main">
  <div id="chat-log"></div>
  <div id="thinking"><span>Gupshup is thinking...</span></div>
  <div id="file-chip"><span id="file-chip-name"></span><button id="file-chip-remove">x</button></div>
  <div id="input-bar">
    <input type="file" id="file-input" style="display:none" />
    <button id="upload-btn" title="Upload file">+</button>
    <input type="text" id="message-input" placeholder="Message Gupshup" />
    <button id="send-btn" title="Send">-></button>
  </div>
</div>

<script>
const API_BASE = "http://127.0.0.1:8000";
let currentThreadId = null;
let pendingFile = null;

const chatLog = document.getElementById("chat-log");
const threadList = document.getElementById("thread-list");
const messageInput = document.getElementById("message-input");
const thinkingEl = document.getElementById("thinking");
const fileChip = document.getElementById("file-chip");
const fileChipName = document.getElementById("file-chip-name");
const fileInput = document.getElementById("file-input");

function addMessageToLog(sender, text) {
  const row = document.createElement("div");
  row.className = "msg-row " + (sender === "user" ? "user" : "bot");
  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = sender === "user" ? "Y" : "G";
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;
  row.appendChild(avatar);
  row.appendChild(bubble);
  chatLog.appendChild(row);
  chatLog.scrollTop = chatLog.scrollHeight;
}

function clearLog() {
  chatLog.innerHTML = "";
}

function renderThreadList(threads) {
  threadList.innerHTML = "";
  threads.forEach(thread => {
    const item = document.createElement("div");
    item.className = "thread-item" + (thread.thread_id === currentThreadId ? " active" : "");
    item.textContent = thread.title || "Untitled chat";
    item.addEventListener("click", () => openThread(thread.thread_id));
    threadList.appendChild(item);
  });
}

async function loadThreads() {
  try {
    const res = await fetch(`${API_BASE}/threads`);
    const data = await res.json();
    renderThreadList(data.threads || []);
  } catch (err) {
    console.error("Could not load threads:", err);
  }
}

async function openThread(threadId) {
  currentThreadId = threadId;
  clearLog();
  try {
    const res = await fetch(`${API_BASE}/threads/${threadId}`);
    const data = await res.json();
    (data.messages || []).forEach(m => addMessageToLog(m.sender, m.content));
  } catch (err) {
    console.error("Could not load thread history:", err);
  }
  loadThreads();
}

function startNewChat() {
  currentThreadId = null;
  clearLog();
  loadThreads();
}

async function sendMessage() {
  const text = messageInput.value.trim();
  if (!text) return;
  addMessageToLog("user", text);
  messageInput.value = "";
  thinkingEl.classList.add("visible");
  try {
    const res = await fetch(`${API_BASE}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        thread_id: currentThreadId,
        message: text
      })
    });
    const data = await res.json();
    if (data.thread_id) currentThreadId = data.thread_id;
    addMessageToLog("bot", data.reply);
  } catch (err) {
    console.error("Chat request failed:", err);
    addMessageToLog("bot", "Something went wrong reaching the server.");
  } finally {
    thinkingEl.classList.remove("visible");
    loadThreads();
  }
}

async function uploadFile(file) {
  const formData = new FormData();
  formData.append("file", file);
  if (currentThreadId) formData.append("thread_id", currentThreadId);
  try {
    const res = await fetch(`${API_BASE}/upload`, {
      method: "POST",
      body: formData
    });
    const data = await res.json();
    if (data.thread_id) currentThreadId = data.thread_id;
    fileChipName.textContent = file.name;
    fileChip.classList.add("visible");
  } catch (err) {
    console.error("Upload failed:", err);
  }
}

document.getElementById("send-btn").addEventListener("click", sendMessage);
messageInput.addEventListener("keydown", e => {
  if (e.key === "Enter") sendMessage();
});
document.getElementById("new-chat-btn").addEventListener("click", startNewChat);
document.getElementById("upload-btn").addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", () => {
  if (fileInput.files.length > 0) {
    pendingFile = fileInput.files[0];
    uploadFile(pendingFile);
  }
});
document.getElementById("file-chip-remove").addEventListener("click", () => {
  fileChip.classList.remove("visible");
  pendingFile = null;
});

loadThreads();
</script>

</body>
</html>
