<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gupshup</title>
<link rel="icon" type="image/svg+xml" href="logo.svg">
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  * { box-sizing: border-box; }
  :root {
    --blue: #3b7ed1;
    --blue-light: rgba(59,126,209,0.15);
    --text: #1c2b3a;
    --text-muted: #7a8a99;
    --border: rgba(59,126,209,0.2);
  }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", sans-serif;
    background: rgb(237, 243, 255);
    color: var(--text);
    height: 100vh;
    display: flex;
    position: relative;
    overflow: hidden;
  }
  .bg-mist {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
    z-index: 0;
    animation: drift 18s ease-in-out infinite;
  }
  .bg-mist-1 { width: 300px; height: 300px; top: -70px; left: -60px; background: #8ecae6; opacity: 0.45; }
  .bg-mist-2 { width: 260px; height: 260px; bottom: -60px; right: -60px; background: #5aa9e6; opacity: 0.35; animation-duration: 22s; }
  @keyframes drift { 0%,100% { transform: translate(0,0); } 50% { transform: translate(20px, 15px); } }
  #delete-modal.visible { display: flex !important; }
  #sidebar {
    position: relative; z-index: 1;
    width: 300px;
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(24px) saturate(150%);
    -webkit-backdrop-filter: blur(24px) saturate(150%);
    border-right: 1px solid rgba(255,255,255,0.6);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #brand { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  #brand .mark {
  width: 26px; height: 26px;
}
  #brand .name { font-weight: 600; font-size: 19px; }
  #new-chat-btn {
    padding: 11px; border-radius: 12px; border: none;
    background: var(--blue); color: white; cursor: pointer;
    font-size: 14px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    box-shadow: 0 3px 10px rgba(59,126,209,0.35);
  }
  #new-chat-btn:hover { opacity: .9; box-shadow: 0 4px 14px rgba(59,126,209,0.45); }
  #thread-label { font-size: 13px; font-weight: 600; color: var(--text-muted); margin: 10px 0 4px; }
  #thread-list { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; flex: 1; }
  .thread-item {
    font-size: 13px; padding: 9px 10px; border-radius: 10px; cursor: pointer;
    color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: flex; align-items: center; gap: 7px;
    background: rgba(59,126,209,0.09);
    border: 1px solid rgba(59,126,209,0.18);
  }
  .thread-item:hover { background: rgba(59,126,209,0.2); }
  .thread-item.active { background: rgba(59,126,209,0.3); border-color: var(--blue); color: var(--blue); font-weight: 600; }
  #signout-btn {
    margin-top: 8px;
    background: rgba(59,126,209,0.12);
    border: 1px solid rgba(59,126,209,0.3);
    color: var(--blue);
    padding: 9px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  #signout-btn:hover { background: rgba(59,126,209,0.22); }

  #tts-toggle-btn {
    padding: 9px;
    border-radius: 10px;
    border: 1px solid rgba(59,126,209,0.3);
    background: rgba(59,126,209,0.12);
    color: var(--blue);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
#tts-toggle-btn:hover { background: rgba(59,126,209,0.22); }
  @keyframes bounce-click {
    0% { transform: scale(1); }
    40% { transform: scale(0.92); }
    70% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }
  .bounce { animation: bounce-click 0.3s ease; }
  #main { position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column; }
  #empty-greeting {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 26px;
    font-weight: 500;
    font-style: italic;
    letter-spacing: 0.2px;
    color: var(--blue);
    opacity: 0.75;
    text-align: center;
    z-index: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  #empty-greeting.hidden { opacity: 0; }
  #chat-log {
    flex: 1; overflow-y: auto; padding: 32px 40px 110px;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }
  .msg-row { display: flex; gap: 10px; max-width: 600px; width: 100%; align-items: center; }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.bot { align-items: flex-start; }
  .avatar {
    width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
    background: var(--blue-light); color: var(--blue);
    display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700;
  }
  .bubble { font-size: 14px; line-height: 1.6; }
  .msg-row.user .bubble {
    background: var(--blue-light); color: var(--text);
    padding: 10px 15px; border-radius: 16px 16px 4px 16px; max-width: 80%;
  }
  .msg-row.bot .bubble { padding-top: 2px; }
  .msg-link-btn {
    border: none; background: transparent; cursor: pointer;
    font-size: 12px; flex-shrink: 0; color: var(--text-muted);
  }
  #file-chip {
    display: none; align-items: center; gap: 6px; width: fit-content; max-width: 600px;
    background: var(--blue-light); color: var(--blue); font-size: 12px;
    padding: 4px 10px; border-radius: 999px; margin: 8px auto 0;
  }
  #file-chip.visible { display: flex; }
  #file-chip button { background: none; border: none; color: var(--blue); cursor: pointer; font-size: 13px; }
  #input-bar {
    position: absolute;
    left: 0; right: 0;
    padding: 20px 40px 24px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    top: 50%;
    transform: translateY(-50%);
    transition: top 0.45s ease, bottom 0.45s ease, transform 0.45s ease;
  }
  #input-bar.at-bottom {
    top: auto;
    bottom: 0;
    transform: translateY(0);
  }
  #thinking {
    display: none; align-items: center; justify-content: center; gap: 8px; max-width: 600px; width: 100%;
    color: var(--text-muted); font-size: 13px;
  }
  #thinking.visible { display: flex; }
  #input-shell {
    width: 100%; max-width: 600px;
    background: rgba(255,255,255,0.45);
    backdrop-filter: blur(20px) saturate(150%);
    -webkit-backdrop-filter: blur(20px) saturate(150%);
    border: 1px solid rgba(255,255,255,0.7);
    border-radius: 24px;
    padding: 6px 8px 6px 18px; display: flex; align-items: center; gap: 8px;
    box-shadow: 0 4px 16px rgba(59,126,209,0.15);
  }
  #upload-btn, #mic-btn, #send-btn {
    border: none; background: transparent; cursor: pointer;
    width: 32px; height: 32px; border-radius: 999px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  #mic-btn.loading { color: #000; }
  #send-btn { background: var(--blue); color: white; }
  #send-btn:hover { opacity: .9; }
  #message-input {
    flex: 1; border: none; background: transparent;
    padding: 8px 4px; font-size: 14px; outline: none; color: var(--text);
  }
</style>
</head>
<body>
<div class="bg-mist bg-mist-1"></div>
<div class="bg-mist bg-mist-2"></div>
<div id="delete-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); align-items:center; justify-content:center; z-index:100;">
  <div style="background:rgba(255,255,255,0.9); backdrop-filter:blur(20px); border-radius:16px; padding:24px; width:320px; box-shadow:0 8px 30px rgba(0,0,0,0.15);">
    <div style="font-weight:600; font-size:15px; margin-bottom:8px;">Delete this chat?</div>
    <div style="font-size:13px; color:var(--text-muted); margin-bottom:20px;">This will permanently delete this chat. Are you sure?</div>
    <div style="display:flex; justify-content:flex-end; gap:8px;">
      <button id="delete-cancel-btn" style="border:1px solid var(--border); background:white; border-radius:8px; padding:7px 14px; font-size:13px; cursor:pointer;">Cancel</button>
      <button id="delete-confirm-btn" style="border:none; background:#d64545; color:white; border-radius:8px; padding:7px 14px; font-size:13px; cursor:pointer;">Delete</button>
    </div>
  </div>
</div>
<div id="sidebar">
  <div id="brand"><img src="logo.svg" class="mark" alt="Gupshup logo" style="padding:3px;"/><div class="name">GupShup</div></div>
  <button id="new-chat-btn"><i>+</i> New chat</button>
  <div id="thread-label">THREADS</div>
  <div id="thread-list"></div>
  <button id="tts-toggle-btn"><i data-lucide="volume-2"></i> Voice replies: Off</button>
  <button id="signout-btn">Sign Out</button>
</div>
<div id="main">
  <div id="empty-greeting">Ready for some GupShup?</div>
  <div id="chat-log"></div>
  <div id="input-bar">
  <input type="file" id="file-input" style="display:none" />
  <div id="file-chip"><span id="file-chip-name"></span><button id="file-chip-remove">x</button></div>
  <div id="input-shell">
      <button id="upload-btn" title="Upload file"><i data-lucide="link"></i></button>
      <button id="mic-btn" title="Speak your message"><i data-lucide="mic"></i></button>
      <input type="text" id="message-input" placeholder="Message GupShup" />
      <button id="send-btn" title="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"></line>
        <polyline points="5 12 12 5 19 12"></polyline>
      </svg>
    </button>
    </div>
  </div>
</div>
<script>
const currentUserId = localStorage.getItem("gupshup_user_id");
if (!currentUserId) {
  window.location.href = "auth.html";
}
const API_BASE = "http://127.0.0.1:8000";
// ---------- TTS: Text-to-Speech ----------

let currentThreadId = null;
let pendingFile = null;
let attachedFileName = null;
let voiceRepliesOn = false;

document.getElementById("tts-toggle-btn").addEventListener("click", (e) => {
  voiceRepliesOn = !voiceRepliesOn;
  const btn = document.getElementById("tts-toggle-btn");
  const iconName = voiceRepliesOn ? "volume-2" : "volume-x";
  btn.innerHTML = `<i data-lucide="${iconName}"></i> Voice replies: ${voiceRepliesOn ? "On" : "Off"}`;
  lucide.createIcons();
});

function speakText(text) {
  if (!voiceRepliesOn) return;
  speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "en-US";
  speechSynthesis.speak(utterance);
}
const chatLog = document.getElementById("chat-log");
const threadList = document.getElementById("thread-list");
const emptyGreeting = document.getElementById("empty-greeting");
const inputBar = document.getElementById("input-bar");
const messageInput = document.getElementById("message-input");
const thinkingEl = document.getElementById("thinking");
const fileChip = document.getElementById("file-chip");
const fileChipName = document.getElementById("file-chip-name");
const fileInput = document.getElementById("file-input");
let modelsLoaded = false;
async function loadFaceModels() {
  await faceapi.nets.tinyFaceDetector.loadFromUri("./models");
  await faceapi.nets.faceLandmark68Net.loadFromUri("./models");
  await faceapi.nets.faceRecognitionNet.loadFromUri("./models");
  modelsLoaded = true;
  console.log("Face models loaded");
}
loadFaceModels();
function addMessageToLog(sender, text, fileName) {
  emptyGreeting.classList.add("hidden");
  inputBar.classList.add("at-bottom");
  const row = document.createElement("div");
  row.className = "msg-row " + (sender === "user" ? "user" : "bot");
  if (sender !== "user") {
    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "G";
    row.appendChild(avatar);
  }
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;
  row.appendChild(bubble);
  if (fileName) {
  const linkBtn = document.createElement("button");
  linkBtn.className = "msg-link-btn";
  linkBtn.textContent = "🔗";
  linkBtn.title = "View attached file";

  const nameLabel = document.createElement("span");
  nameLabel.textContent = fileName;
  nameLabel.style.fontSize = "12px";
  nameLabel.style.color = "var(--text-muted)";
  nameLabel.style.display = "none";

  linkBtn.addEventListener("click", () => {
    nameLabel.style.display = nameLabel.style.display === "none" ? "inline" : "none";
  });

  row.appendChild(linkBtn);
  row.appendChild(nameLabel);
}
  chatLog.appendChild(row);
  chatLog.scrollTop = chatLog.scrollHeight;
}
function clearLog() {
  chatLog.innerHTML = "";
}
function renderThreadList(threads) {
  threadList.innerHTML = "";
  threads.forEach(thread => {
    const item = document.createElement("div");
    item.className = "thread-item" + (thread.thread_id === currentThreadId ? " active" : "");
    item.style.display = "flex";
    item.style.alignItems = "center";
    item.style.justifyContent = "space-between";
    const label = document.createElement("span");
    label.textContent = thread.title || "Untitled chat";
    label.style.overflow = "hidden";
    label.style.textOverflow = "ellipsis";
    label.style.whiteSpace = "nowrap";
    label.style.flex = "1";
    label.addEventListener("click", () => openThread(thread.thread_id));
    const editBtn = document.createElement("button");
    editBtn.textContent = "✎";
    editBtn.title = "Rename";
    editBtn.style.border = "none";
    editBtn.style.background = "transparent";
    editBtn.style.cursor = "pointer";
    editBtn.style.color = "inherit";
    editBtn.style.fontSize = "12px";
    editBtn.style.flexShrink = "0";
    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "🗑";
    deleteBtn.title = "Delete";
    deleteBtn.style.border = "none";
    deleteBtn.style.background = "transparent";
    deleteBtn.style.cursor = "pointer";
    deleteBtn.style.color = "inherit";
    deleteBtn.style.fontSize = "12px";
    deleteBtn.style.flexShrink = "0";
    deleteBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      openDeleteModal(thread.thread_id);
    });
    editBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      const input = document.createElement("input");
      input.type = "text";
      input.value = thread.title || "";
      input.style.flex = "1";
      input.style.fontSize = "13px";
      input.style.border = "1px solid var(--border)";
      input.style.borderRadius = "6px";
      input.style.padding = "2px 6px";
      item.replaceChild(input, label);
      input.focus();
      input.select();
      async function saveRename() {
        const newTitle = input.value.trim();
        if (newTitle && newTitle !== thread.title) {
          await fetch(`${API_BASE}/threads/${thread.thread_id}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title: newTitle })
          });
        }
        loadThreads();
      }
      input.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter") saveRename();
        if (ev.key === "Escape") loadThreads();
      });
      input.addEventListener("blur", saveRename);
    });
    item.appendChild(label);
    item.appendChild(editBtn);
    item.appendChild(deleteBtn);
    threadList.appendChild(item);
  });
}
async function loadThreads() {
  try {
    const res = await fetch(`${API_BASE}/threads?user_id=${currentUserId}`);
    const data = await res.json();
    renderThreadList(data.threads || []);
  } catch (err) {
    console.error("Could not load threads:", err);
  }
}
let threadPendingDelete = null;
const deleteModal = document.getElementById("delete-modal");
function openDeleteModal(threadId) {
  threadPendingDelete = threadId;
  deleteModal.classList.add("visible");
}
function closeDeleteModal() {
  threadPendingDelete = null;
  deleteModal.classList.remove("visible");
}
document.getElementById("delete-cancel-btn").addEventListener("click", closeDeleteModal);
document.getElementById("delete-confirm-btn").addEventListener("click", async () => {
  if (!threadPendingDelete) return;
  await fetch(`${API_BASE}/threads/${threadPendingDelete}`, { method: "DELETE" });
  if (threadPendingDelete === currentThreadId) {
    currentThreadId = null;
    clearLog();
  }
  closeDeleteModal();
  loadThreads();
});
async function openThread(threadId) {
  currentThreadId = threadId;
  clearLog();
  inputBar.classList.add("at-bottom");
  emptyGreeting.classList.add("hidden");
  try {
    const res = await fetch(`${API_BASE}/threads/${threadId}`);
    const data = await res.json();
    (data.messages || []).forEach(m => addMessageToLog(m.sender, m.content));
  } catch (err) {
    console.error("Could not load thread history:", err);
  }
  loadThreads();
}
function startNewChat() {
  currentThreadId = null;
  clearLog();
  emptyGreeting.classList.remove("hidden");
  inputBar.classList.remove("at-bottom");
  loadThreads();
}
async function sendMessage() {
  const text = messageInput.value.trim();
  if (!text) return;
  addMessageToLog("user", text, attachedFileName);
  attachedFileName = null;
  messageInput.value = "";
  fileChip.classList.remove("visible");

  const placeholder = document.createElement("div");
  placeholder.className = "msg-row bot";
  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = "G";
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = "GupShup is thinking...";
  placeholder.appendChild(avatar);
  placeholder.appendChild(bubble);
  chatLog.appendChild(placeholder);
  chatLog.scrollTop = chatLog.scrollHeight;

  try {
    const res = await fetch(`${API_BASE}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        thread_id: currentThreadId,
        message: text,
        user_id: currentUserId
      })
    });
    const data = await res.json();
    if (data.thread_id) currentThreadId = data.thread_id;
    placeholder.remove();
    addMessageToLog("bot", data.reply);

    speakText(data.reply);

  } catch (err) {
    console.error("Chat request failed:", err);
    placeholder.remove();
    addMessageToLog("bot", "Something went wrong reaching the server.");
  } finally {
    loadThreads();
  }
}
async function uploadFile(file) {
  const formData = new FormData();
  formData.append("file", file);
  if (currentThreadId) formData.append("thread_id", currentThreadId);

  fileChipName.textContent = `Uploading ${file.name}...`;
  fileChip.classList.add("visible");

  try {
    const res = await fetch(`${API_BASE}/upload`, {
      method: "POST",
      body: formData
    });
    const data = await res.json();
    if (data.thread_id) currentThreadId = data.thread_id;
    fileChipName.textContent = data.filename;
    attachedFileName = data.filename;
    loadThreads();
  } catch (err) {
    console.error("Upload failed:", err);
    fileChipName.textContent = "Upload failed";
    setTimeout(() => {
      fileChip.classList.remove("visible");
    }, 1800);
  }
}

let mediaRecorder;
let audioChunks = [];

document.getElementById("mic-btn").addEventListener("click", async () => {
  const micBtn = document.getElementById("mic-btn");

  if (!mediaRecorder || mediaRecorder.state === "inactive") {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];

    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

    mediaRecorder.onstop = async () => {
      const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
      const formData = new FormData();
      formData.append("file", audioBlob, "recording.webm");

      micBtn.classList.add("loading");
      micBtn.innerHTML = '<i data-lucide="loader-2"></i>';
      lucide.createIcons();
      try {
        const res = await fetch(`${API_BASE}/transcribe`, {
          method: "POST",
          body: formData
        });
        const data = await res.json();
        if (res.ok) {
          messageInput.value = data.text;
        } else {
          messageInput.placeholder = data.detail || "Could not transcribe, try again";
        }
      } catch (err) {
        console.error("Transcription failed:", err);
      }
      micBtn.classList.remove("loading");
      micBtn.innerHTML = '<i data-lucide="mic"></i>';
      lucide.createIcons();
    };

    mediaRecorder.start();
    micBtn.innerHTML = '<i data-lucide="square"></i>';
    lucide.createIcons();
  } else {
    mediaRecorder.stop();
  }
});
document.getElementById("send-btn").addEventListener("click", sendMessage);
messageInput.addEventListener("keydown", e => {
  if (e.key === "Enter") sendMessage();
});
messageInput.addEventListener("input", () => {
  if (messageInput.value.trim().length > 0) {
    emptyGreeting.classList.add("hidden");
  } else if (chatLog.children.length === 0) {
    emptyGreeting.classList.remove("hidden");
  }
});
document.getElementById("new-chat-btn").addEventListener("click", (e) => {
  e.currentTarget.classList.remove("bounce");
  requestAnimationFrame(() => e.currentTarget.classList.add("bounce"));
  startNewChat();
});
document.getElementById("upload-btn").addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", () => {
  if (fileInput.files.length > 0) {
    pendingFile = fileInput.files[0];
    uploadFile(pendingFile);
  }
});
document.getElementById("file-chip-remove").addEventListener("click", () => {
  fileChip.classList.remove("visible");
  pendingFile = null;
});
document.getElementById("signout-btn").addEventListener("click", (e) => {
  e.currentTarget.classList.remove("bounce");
  requestAnimationFrame(() => e.currentTarget.classList.add("bounce"));
  localStorage.removeItem("gupshup_user_id");
  localStorage.removeItem("gupshup_username");
  window.location.href = "auth.html";
});
loadThreads();
lucide.createIcons();
</script>
</body>
</html>
