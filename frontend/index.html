<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gupshup</title>
<style>
  :root {
    --coral: #d85a30;
    --coral-light: #faece7;
    --teal: #0f6e56;
    --teal-light: #e1f5ee;
    --bg: #faf9f6;
    --card: #ffffff;
    --border: #e5e2da;
    --text: #26211c;
    --text-muted: #8a8579;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
  }
  #sidebar {
    width: 220px;
    background: var(--bg);
    border-right: 1px solid var(--border);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #brand { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  #brand .mark {
    width: 26px; height: 26px; border-radius: 7px;
    background: var(--coral-light); color: var(--coral);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px;
  }
  #brand .name { font-weight: 600; font-size: 15px; }
  #new-chat-btn {
    padding: 8px; border-radius: 8px; border: none;
    background: var(--coral-light); color: var(--coral); cursor: pointer;
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  #new-chat-btn:hover { opacity: .85; }
  #thread-label { font-size: 11px; color: var(--text-muted); margin: 10px 0 2px; }
  #thread-list { display: flex; flex-direction: column; gap: 3px; overflow-y: auto; }
  .thread-item {
    font-size: 13px; padding: 7px 9px; border-radius: 8px; cursor: pointer;
    color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: flex; align-items: center; gap: 7px;
  }
  .thread-item:hover { background: var(--card); }
  .thread-item.active { background: var(--teal-light); color: var(--teal); font-weight: 600; }
  #main { flex: 1; display: flex; flex-direction: column; position: relative; background: var(--bg); }
  #chat-log {
    flex: 1; overflow-y: auto; padding: 32px 40px 0;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }
  .msg-row { display: flex; gap: 10px; max-width: 600px; width: 100%; }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.bot { align-items: flex-start; }
  .avatar {
    width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
    background: var(--teal-light); color: var(--teal);
    display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700;
  }
  .bubble { font-size: 14px; line-height: 1.6; }
  .msg-row.user .bubble {
    background: var(--coral-light); color: var(--text);
    padding: 10px 15px; border-radius: 16px 16px 4px 16px; max-width: 80%;
  }
  .msg-row.bot .bubble { padding-top: 2px; }
  #thinking {
    display: none; align-items: center; gap: 8px; max-width: 600px; width: 100%;
    margin: 0 auto; padding: 0 40px 4px; color: var(--text-muted); font-size: 13px;
  }
  #thinking.visible { display: flex; }
  #file-chip {
    display: none; align-items: center; gap: 6px; width: fit-content; max-width: 600px;
    background: var(--teal-light); color: var(--teal); font-size: 12px;
    padding: 4px 10px; border-radius: 999px; margin: 8px auto 0;
  }
  #file-chip.visible { display: flex; }
  #file-chip button { background: none; border: none; color: var(--teal); cursor: pointer; font-size: 13px; }
  #input-bar { padding: 20px 40px 24px; display: flex; justify-content: center; }
  #input-shell {
    width: 100%; max-width: 600px; background: var(--card);
    border: 1px solid var(--border); border-radius: 24px;
    padding: 6px 8px 6px 18px; display: flex; align-items: center; gap: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  }
  #upload-btn, #send-btn {
    border: none; background: transparent; cursor: pointer;
    width: 32px; height: 32px; border-radius: 999px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  #upload-btn:hover { background: var(--bg); }
  #send-btn { background: var(--coral); color: white; }
  #send-btn:hover { opacity: .9; }
  #message-input {
    flex: 1; border: none; background: transparent;
    padding: 8px 4px; font-size: 14px; outline: none;
  }
</style>
</head>
<body>

<div id="sidebar">
  <div id="brand"><div class="mark">G</div><div class="name">Gupshup</div></div>
  <button id="new-chat-btn"><i>+</i> New chat</button>
  <div id="thread-label">THREADS</div>
  <div id="thread-list"></div>
</div>

<div id="main">
  <div id="chat-log"></div>
  <div id="thinking"><span>Gupshup is thinking...</span></div>
  <div id="file-chip"><span id="file-chip-name"></span><button id="file-chip-remove">x</button></div>
  <div id="input-bar">
    <input type="file" id="file-input" style="display:none" />
    <div id="input-shell">
      <button id="upload-btn" title="Upload file">+</button>
      <input type="text" id="message-input" placeholder="Message Gupshup" />
      <button id="send-btn" title="Send">-></button>
    </div>
  </div>
</div>

<script>
const API_BASE = "http://127.0.0.1:8000";
let currentThreadId = null;
let pendingFile = null;

const chatLog = document.getElementById("chat-log");
const threadList = document.getElementById("thread-list");
const messageInput = document.getElementById("message-input");
const thinkingEl = document.getElementById("thinking");
const fileChip = document.getElementById("file-chip");
const fileChipName = document.getElementById("file-chip-name");
const fileInput = document.getElementById("file-input");

function addMessageToLog(sender, text) {
  const row = document.createElement("div");
  row.className = "msg-row " + (sender === "user" ? "user" : "bot");

  if (sender !== "user") {
    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "G";
    row.appendChild(avatar);
  }

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;
  row.appendChild(bubble);

  chatLog.appendChild(row);
  chatLog.scrollTop = chatLog.scrollHeight;
}

function clearLog() {
  chatLog.innerHTML = "";
}

function renderThreadList(threads) {
  threadList.innerHTML = "";
  threads.forEach(thread => {
    const item = document.createElement("div");
    item.className = "thread-item" + (thread.thread_id === currentThreadId ? " active" : "");
    item.textContent = thread.title || "Untitled chat";
    item.addEventListener("click", () => openThread(thread.thread_id));
    threadList.appendChild(item);
  });
}

async function loadThreads() {
  try {
    const res = await fetch(`${API_BASE}/threads`);
    const data = await res.json();
    renderThreadList(data.threads || []);
  } catch (err) {
    console.error("Could not load threads:", err);
  }
}

async function openThread(threadId) {
  currentThreadId = threadId;
  clearLog();
  try {
    const res = await fetch(`${API_BASE}/threads/${threadId}`);
    const data = await res.json();
    (data.messages || []).forEach(m => addMessageToLog(m.sender, m.content));
  } catch (err) {
    console.error("Could not load thread history:", err);
  }
  loadThreads();
}

function startNewChat() {
  currentThreadId = null;
  clearLog();
  loadThreads();
}

async function sendMessage() {
  const text = messageInput.value.trim();
  if (!text) return;
  addMessageToLog("user", text);
  messageInput.value = "";
  thinkingEl.classList.add("visible");
  try {
    const res = await fetch(`${API_BASE}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        thread_id: currentThreadId,
        message: text
      })
    });
    const data = await res.json();
    if (data.thread_id) currentThreadId = data.thread_id;
    addMessageToLog("bot", data.reply);
  } catch (err) {
    console.error("Chat request failed:", err);
    addMessageToLog("bot", "Something went wrong reaching the server.");
  } finally {
    thinkingEl.classList.remove("visible");
    loadThreads();
  }
}

async function uploadFile(file) {
  const formData = new FormData();
  formData.append("file", file);
  if (currentThreadId) formData.append("thread_id", currentThreadId);
  try {
    const res = await fetch(`${API_BASE}/upload`, {
      method: "POST",
      body: formData
    });
    const data = await res.json();
    if (data.thread_id) currentThreadId = data.thread_id;
    fileChipName.textContent = `${data.filename} (${data.chunks_stored} chunks)`;
    fileChip.classList.add("visible");
    loadThreads();
  } catch (err) {
    console.error("Upload failed:", err);
  }
}

document.getElementById("send-btn").addEventListener("click", sendMessage);
messageInput.addEventListener("keydown", e => {
  if (e.key === "Enter") sendMessage();
});
document.getElementById("new-chat-btn").addEventListener("click", startNewChat);
document.getElementById("upload-btn").addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", () => {
  if (fileInput.files.length > 0) {
    pendingFile = fileInput.files[0];
    uploadFile(pendingFile);
  }
});
document.getElementById("file-chip-remove").addEventListener("click", () => {
  fileChip.classList.remove("visible");
  pendingFile = null;
});

loadThreads();
</script>

</body>
</html>
